<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSD Flashcards – Complete Course Review</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#f5f0e8;--paper2:#ede7d9;--ink:#1a1612;--ink2:#4a3f35;
      --ink3:#9a8e82;--rule:#d4c9b8;--pop:#1e5fc9;
      --answer-bg:#e8eef8;--answer-ink:#1a2e4a;--answer-rule:#b0c9e8;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;
      min-height:100dvh;display:flex;flex-direction:column;
      background-image:repeating-linear-gradient(to bottom,transparent,transparent 27px,var(--rule) 27px,var(--rule) 28px);
      background-attachment:fixed;
    }
    .topbar{
      background:var(--ink);color:var(--paper);padding:10px 24px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:10;
    }
    .topbar-title{font-family:'DM Serif Display',serif;font-size:1.15rem;}
    .topbar-title em{font-style:italic;color:#c8b99a;}
    .topbar-counter{font-family:'DM Mono',monospace;font-size:0.7rem;color:#9a8e82;letter-spacing:0.08em;}
    .topbar-counter span{color:#f5f0e8;}
    .unit-strip{
      background:var(--paper2);border-bottom:1px solid var(--rule);
      padding:0 16px;display:flex;overflow-x:auto;
      scrollbar-width:none;-webkit-overflow-scrolling:touch;
    }
    .unit-strip::-webkit-scrollbar{display:none;}
    .unit-tab{
      flex-shrink:0;padding:10px 16px;font-family:'DM Mono',monospace;
      font-size:0.72rem;letter-spacing:0.06em;color:var(--ink3);
      background:transparent;border:none;border-bottom:2px solid transparent;
      cursor:pointer;transition:color 0.12s,border-color 0.12s;white-space:nowrap;
    }
    .unit-tab:hover{color:var(--ink);}
    .unit-tab.active{color:var(--pop);border-bottom-color:var(--pop);font-weight:500;}
    .main{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:32px 24px 24px;gap:20px;
    }
    .progress-bar{width:100%;max-width:640px;height:2px;background:var(--rule);border-radius:1px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--pop);transition:width 0.3s ease;}
    .card-scene{width:100%;max-width:640px;perspective:1400px;cursor:pointer;height:520px;}
    .card{
      position:relative;width:100%;height:100%;
      transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.35,0,0.25,1);border-radius:3px;
    }
    .card.flipped{transform:rotateY(180deg);}
    .card-face{
      position:absolute;inset:0;border-radius:3px;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      display:flex;flex-direction:column;padding:24px 28px;
      border:1px solid var(--rule);box-shadow:0 4px 18px rgba(26,22,18,0.10);
      overflow:hidden;
    }
    .card-front{background:#fff;}
    .card-back{background:var(--answer-bg);transform:rotateY(180deg);border-color:var(--answer-rule);}
    .card-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--rule);
      flex-shrink:0;
    }
    .card-back .card-header{border-bottom-color:var(--answer-rule);}
    .card-type{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);}
    .card-back .card-type{color:#4a7ac9;}
    .card-unit{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--ink3);background:var(--paper2);padding:3px 8px;border-radius:2px;}
    .card-back .card-unit{background:#cad8ed;color:var(--answer-ink);}
    .card-body{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 0 12px;overflow-y:auto;min-height:0;}
    .card-back .card-body{align-items:flex-start;}
    .card-text{font-family:'DM Sans',sans-serif;font-size:clamp(0.85rem,2.2vw,1rem);line-height:1.72;text-align:center;color:var(--ink);word-break:break-word;}
    .card-back .card-text{color:var(--answer-ink);font-size:0.82rem;text-align:left;line-height:1.6;width:100%;}
    .card-back .card-text b,.card-back .card-text strong{color:#1a3a6a;font-weight:600;}
    .card-back .card-text ul{padding-left:16px;margin:6px 0;}
    .card-back .card-text li{margin:4px 0;}
    .card-mark{font-family:'DM Serif Display',serif;font-style:italic;font-size:3.5rem;line-height:1;color:var(--rule);position:absolute;bottom:14px;right:22px;user-select:none;pointer-events:none;}
    .card-back .card-mark{color:var(--answer-rule);}
    .card-hint{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink3);text-align:center;letter-spacing:0.04em;flex-shrink:0;}
    .nav{display:flex;align-items:center;gap:10px;width:100%;max-width:640px;}
    .nav-btn{
      width:44px;height:44px;border-radius:2px;border:1px solid var(--rule);
      background:#fff;color:var(--ink2);font-size:1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.12s;flex-shrink:0;-webkit-tap-highlight-color:transparent;
    }
    .nav-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}
    .nav-btn:active{transform:scale(0.93);}
    .flip-btn{
      flex:1;height:44px;border-radius:2px;border:1px solid var(--ink);
      background:var(--ink);color:var(--paper);font-family:'DM Serif Display',serif;
      font-style:italic;font-size:1rem;cursor:pointer;transition:all 0.12s;
      -webkit-tap-highlight-color:transparent;
    }
    .flip-btn:hover{background:var(--pop);border-color:var(--pop);}
    .flip-btn:active{transform:scale(0.98);}
    .swipe-hint{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink3);letter-spacing:0.06em;}
    @keyframes fromRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fromLeft{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
    .slide-right .card{animation:fromRight 0.22s ease;}
    .slide-left .card{animation:fromLeft 0.22s ease;}
    @media(max-width:480px){.card-scene{height:580px;}.card-face{padding:16px 16px}.main{padding:16px 10px 12px}.topbar{padding:10px 14px}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">PSD <em>Flashcards</em></div>
  <div class="topbar-counter" id="topCounter"></div>
</header>
<nav class="unit-strip" id="unitStrip"></nav>
<main class="main" id="main"></main>

<script>
const UNITS=[
  {id:'all',    label:'All Cards'},
  {id:'SWEng',  label:'SW Engineering'},
  {id:'Agile',  label:'Agile & Scrum'},
  {id:'Req',    label:'Requirements'},
  {id:'DevPrac',label:'Dev Practices'},
  {id:'CICD',   label:'CI/CD & DevOps'},
  {id:'Testing',label:'Testing & QA'},
  {id:'Arch',   label:'Architecture'},
  {id:'Process',label:'Process Impr.'},
  {id:'Growth', label:'Growth Science'},
  {id:'Sus',    label:'Sustainability'},
];

const ALL_CARDS=[
  {u:'SWEng', q:'Introduction to Software Engineering', a:`<b>Why Projects Fail & Core Characteristics</b><br>
<ul>
  <li>Software projects fail because development of high-quality, defect-free software is inherently hard.</li>
  <li>Failures often happen because we build a system for the wrong reason, the wrong system entirely, or the system in the wrong way.</li>
  <li>Software is intrinsically: <strong>complex, intangible, malleable, evolutionary, and difficult to scale</strong>.</li>
  <li><strong>Software Engineering definition:</strong> The application of a systematic, disciplined, quantifiable approach to development, operation, and maintenance.</li>
</ul>`},

  {u:'Agile', q:'Agile & Empirical Process Control', a:`<b>Agile Foundations</b><br>
<ul>
  <li>Systems development is highly complex; treating it like an "assembly line" causes failure. It requires "empirical process control" characterised by <strong>frequent inspection and immediate adjustments</strong>.</li>
  <li><strong>Agile Manifesto Values:</strong> Individuals and interactions over processes and tools; Working software over documentation; Customer collaboration over contract negotiation; Responding to change over following a plan.</li>
  <li>In practice: small teams (3–12), short structured meetings, small deliveries of features, continuous testing, and refactoring.</li>
</ul>`},

  {u:'Agile', q:'The Scrum Framework', a:`<b>Scrum Roles & Workflow</b><br>
<ul>
  <li><strong>Roles:</strong> Scrum Master, Product Owner, Team Manager, Quality Assurance Manager, Chief Architect, UX Designer, Developer.</li>
  <li><strong>Sprints:</strong> Work is organised into sprints, typically lasting 1 to 3 weeks.</li>
  <li><strong>Stand-ups:</strong> Frequent meetings (max 10 mins) where each member answers: What did you accomplish? What are you working on? Do you have blockers?</li>
  <li><strong>Review vs. Retrospective:</strong> Sprint Review demonstrates the new version of the software. The Retrospective focuses on reviewing the team's process.</li>
</ul>`},

  {u:'Agile', q:'Customer Management & IP', a:`<b>Managing Expectations & Ownership</b><br>
<ul>
  <li><strong>Customer Responsibilities:</strong> Committing to a time budget (e.g. 40 hours) and providing resources beyond standard lab software.</li>
  <li><strong>Your Responsibilities:</strong> Managing their expectations, being flexible but realistic, and identifying a "Minimum Viable Product".</li>
  <li><strong>Intellectual Property (IP):</strong> The University considers students to own all "foreground" IP for coursework. Open source licenses are often the best solution for standard projects.</li>
  <li>If a company wants ownership of IP for commercial value, there should be an IP transfer and suitable compensation.</li>
</ul>`},

  {u:'Req', q:'Requirements Management', a:`<b>User Stories, Actors, and Estimation</b><br>
<ul>
  <li>Requirements specify the system boundary.</li>
  <li><strong>Actors/Personas:</strong> Essential for justifying features. Includes their goals and frustrations.</li>
  <li><strong>User Story Format:</strong> "As an [actor] I want to [action] So that [rationale]".</li>
  <li><strong>INVEST Quality:</strong> Independent, Negotiable, Valuable, Estimable, Small, Testable.</li>
  <li><strong>MoSCoW Prioritisation:</strong> Must have, Should have, Could have, Would be nice to have.</li>
  <li><strong>Planning Poker:</strong> An empirical method used by teams to estimate task complexity.</li>
</ul>`},

  {u:'DevPrac', q:'Change Management & VCS', a:`<b>Version Control Systems & Branching</b><br>
<ul>
  <li><strong>Change Control Items:</strong> Source code, build scripts, documentation, requirements. <strong>NOT Items:</strong> Compiled binaries, log files.</li>
  <li><strong>Commits:</strong> Consist of a unique ID, parent IDs, changes/additions/removals, and metadata (author, timestamp, log message).</li>
  <li><strong>Commit Logs:</strong> Good practice requires a short/meaningful title, intent description, and a link to the issue/merge request.</li>
  <li><strong>Branching Strategies:</strong> Trunk Based Development, Feature Branching, and Staging Branches. Helps experiment with features or prepare releases.</li>
</ul>`},

  {u:'DevPrac', q:'Software Licensing', a:`<b>Copyright, Copyleft, and Liabilities</b><br>
<ul>
  <li>A software license covers: Ownership, usage rights, distribution rights (copyright), engineering rights (modification), and warranties/liability.</li>
  <li><strong>Copyright Act 1988:</strong> Grants exclusive right to copy the work, issue copies to the public, and make adaptations.</li>
  <li><strong>Warranties &amp; Liability:</strong> Warranty asserts the period of time the provider ensures the software functions. Liability asserts who is responsible for damages.</li>
  <li><strong>Common Licenses:</strong> Creative Commons (Attribution, ShareAlike, NonCommercial), GNU GPL, BSD License.</li>
</ul>`},

  {u:'DevPrac', q:'Code Reviews', a:`<b>Quality Assurance &amp; Merge Requests</b><br>
<ul>
  <li><strong>Purpose:</strong> Detect defects, identify refactoring opportunities, develop a shared understanding, and share good practice.</li>
  <li><strong>Merge Request Best Practices:</strong> Keep requests small — a single review should be max ~300 lines of code and take ~30 minutes.</li>
  <li><strong>Automation:</strong> Block MRs that fail standards (e.g. breaking tests, styling violations, commented-out code).</li>
  <li><strong>Review Questions:</strong> Does this code handle exceptional situations? Are there clones present? Are relevant security patterns followed?</li>
</ul>`},

  {u:'CICD', q:'Infrastructure as Code (IaC)', a:`<b>Virtualisation &amp; Configuration</b><br>
<ul>
  <li><strong>Virtualisation Advantages:</strong> Centralised infrastructure monitoring, better resilience to physical device failure, and easier scaling of tenancies.</li>
  <li><strong>Styles of IaC:</strong> Can be Declarative or Imperative, utilising tools like Dockerfiles, Chef, Ansible, Kubernetes, and Terraform.</li>
  <li><strong>Good Practices:</strong> Use version control to maintain configurations, store secrets outside version control, make infrastructures unchangeable, and modularise infrastructure.</li>
</ul>`},

  {u:'CICD', q:'Build, Release & Dependency Management', a:`<b>Versioning, Caching &amp; Deprecation</b><br>
<ul>
  <li><strong>Tooling:</strong> Maven, Gradle, NPM, and Pip enable caching of 'oven ready' components and automate compilation.</li>
  <li><strong>Dependency Resolution:</strong> Known to be NP complete; tools employ strategies like 'Nearest version wins' (e.g. Maven, PIP).</li>
  <li><strong>Semantic Versioning:</strong> Format is major.minor.incremental[-tag], where major is a breaking change, minor is a feature, and incremental is a patch.</li>
  <li><strong>Deprecation:</strong> A feature left for compatibility but scheduled for removal; developers must document its scope, schedule, and the replacement mechanism.</li>
</ul>`},

  {u:'CICD', q:'Continuous Integration (CI)', a:`<b>Avoiding Integration Hell</b><br>
<ul>
  <li><strong>Core CI Practices:</strong> Maintain a single source repository, ensure everyone commits to the mainline every day, and make sure every commit builds the mainline on an integration machine.</li>
  <li><strong>Staging Limitations:</strong> Staging environments may be distributed on too many computing nodes, have too many configurations, or lack access to production-only data sets to perfectly mimic live environments.</li>
  <li><strong>CI Environments/Tools:</strong> Jenkins, GitLab Runner, and TravisCI automate testing and regression checks to detect broken builds early.</li>
</ul>`},

  {u:'Testing', q:'Behaviour Driven Development (BDD)', a:`<b>Testing Scales &amp; Executable Specs</b><br>
<ul>
  <li><strong>Scales of Testing:</strong> Includes Unit tests, Integration tests, and Acceptance (or system) tests.</li>
  <li><strong>Scenario Formatting:</strong> Given (sets up test fixture), When (actions taken during test), and Then (assertions made about system state).</li>
  <li><strong>Frameworks:</strong> Implementations exist in multiple languages — Cucumber (Ruby/Java), Behave (Python), and JBehave (Java).</li>
  <li><strong>Good Practices:</strong> Keep scenarios short, comply with the AAA (Arrange/Act/Assert) convention, and write features in user domain language.</li>
</ul>`},

  {u:'Testing', q:'Automated Code Analysis', a:`<b>Detecting Smells &amp; Mutants</b><br>
<ul>
  <li><strong>Testing vs Analysis:</strong> While testing focuses on what code should do, code analysis focuses on how the application is implemented and flags "bad smells".</li>
  <li><strong>Bug Detection:</strong> Automated analysis can find unreachable code, implicit usage, incorrect operators, or SQL injection vulnerabilities (often fixed using PreparedStatements).</li>
  <li><strong>Mutation Testing:</strong> Measures test suite efficiency by injecting defects (mutants) to see if tests fail. Efficiency = killed mutants / failed tests.</li>
  <li><strong>Survivors:</strong> Mutants that successfully pass all tests and remain undetected are called 'survivors'.</li>
</ul>`},

  {u:'Arch', q:'Software Architecture', a:`<b>Components, Contracts &amp; Patterns</b><br>
<ul>
  <li><strong>Components vs Objects:</strong> Components are self-contained distinct development efforts, can be implemented in different languages, and communicate over standards (e.g. IDL or network protocols).</li>
  <li><strong>Design by Contract:</strong> Documents an interface by defining the benefits offered and obligations imposed, explicitly stating Pre-conditions, Post-conditions, and Invariants.</li>
  <li><strong>Architectural Patterns:</strong> Common models include Model-View-Control (MVC), Client-Server (Thin vs Fat), Peer-to-Peer, Message-Oriented, Pipe and Filter, and Plugin architectures.</li>
</ul>`},

  {u:'CICD', q:'DevOps', a:`<b>Development to Operations</b><br>
<ul>
  <li><strong>Release Handoff:</strong> Requires a package of code/artifacts, an installation and configuration guide, an acceptance test plan, and a plan for rollback.</li>
  <li><strong>Consistent Environments:</strong> Crucial to maintain consistency across Development, QA, UAT, and Prod — covering OS flavours, file systems, and language runtimes.</li>
  <li><strong>Deployment Secrets:</strong> Database passwords and API keys should be managed via environment variables (e.g. os.getenv) rather than hardcoded in files.</li>
  <li><strong>Monitoring:</strong> Essential metrics include node heartbeats, resource usage (CPU/memory), user behaviour tracking, and live logging streams.</li>
</ul>`},

  {u:'Process', q:'Software Process Improvement', a:`<b>Frameworks &amp; Agile Principles</b><br>
<ul>
  <li><strong>Frameworks:</strong> ISO 9001, Six Sigma, Capability Maturity Model (CMMI).</li>
  <li><strong>Process Loop:</strong> Gather data → Analyse → Identify actions → Prioritise/Implement.</li>
  <li><strong>Agile Principles:</strong> Improvement is ongoing and requires whole-team participation. Focus on root causes, not symptoms.</li>
  <li><strong>Best Effort Assumption:</strong> Assume everyone is doing their best; blaming is counterproductive and working harder won't fix a broken process.</li>
</ul>`},

  {u:'Process', q:'Scrum Retrospectives', a:`<b>Data Gathering &amp; Root Cause Analysis</b><br>
<ul>
  <li><strong>Data Gathering Templates:</strong> Stop/Start/Continue, Mad/Sad/Glad, Loved/Learned/Lacked, Sailboat.</li>
  <li><strong>Process:</strong> Team populates sticky notes → Group similar items → Vote on priority → Discuss root cause → Select actions.</li>
  <li><strong>The 5 Whys:</strong> A technique to get to the root cause by repeatedly asking "Why?" until a process failure is identified (e.g. late delivery → late integration).</li>
  <li><strong>Keeping it Fresh:</strong> Vary the structure, change frequencies, and rotate facilitators to prevent stale meetings.</li>
</ul>`},

  {u:'Growth', q:'Intro to Growth Science', a:`<b>Growth Engineering vs. Product Development</b><br>
<ul>
  <li><strong>Growth Engineering:</strong> Techniques for systematically introducing a new product idea into a large-scale market and driving it to scale.</li>
  <li><strong>Product vs. Growth:</strong> Product development focuses on building what customers want. Growth engineering focuses on creating a market when there are no customers yet.</li>
  <li><strong>Silicon Valley Success:</strong> Relies on generational, systematised innovation (Semiconductors → PC/Software → Internet/Platforms → Mobile).</li>
</ul>`},

  {u:'Growth', q:'The Growth Model', a:`<b>The Customer Journey</b><br>
<ul>
  <li><strong>The User Journey:</strong> Acquire → Activate → Retain → Refer new users → Monetize.</li>
  <li><strong>Linear Marketing:</strong> Used initially (SEO, SEM, PR, Events) to attract the first users.</li>
  <li><strong>The Dual Goal:</strong> 1) Optimise the individual user journey. 2) Generate referrals to drive compounding growth loops.</li>
</ul>`},

  {u:'Growth', q:'Retention & Churn', a:`<b>The Foundation of Compounding Growth</b><br>
<ul>
  <li><strong>Retention:</strong> The absolute foundation of compounding growth. Without it, growth stalls.</li>
  <li><strong>Retention is a Trend:</strong> It's not a single number. Saying "50% retention after 12 weeks" is meaningless if it drops to 0% at 14 weeks. You must look at Cohort Graphs.</li>
  <li><strong>Churn Impact:</strong> Even a 1% constant churn means slowly losing your base. A 33% churn puts a business strictly on a path to failure.</li>
</ul>`},

  {u:'Growth', q:'Compounding Growth Loops', a:`<b>Invitational &amp; Content-Driven Loops</b><br>
<ul>
  <li><strong>Hypothesis Testing:</strong> Startups systematically generate, test, learn, and prioritise hypotheses to optimise growth.</li>
  <li><strong>Direct Invitational Loop:</strong> Users directly invite others (e.g. WhatsApp users inviting friends; LinkedIn users inviting colleagues).</li>
  <li><strong>Content-Driven Loop:</strong> Users create content (blogs/profiles) → Google indexes content → New people search and find content → They sign up and create more content (e.g. LinkedIn).</li>
</ul>`},

  {u:'Sus', q:'Frugal Computing', a:`<b>The Climate Challenge &amp; ICT Emissions</b><br>
<ul>
  <li><strong>Finite Resources:</strong> Computational resources have historically been treated as infinite, but Koomey/Moore's laws can no longer offset demand.</li>
  <li><strong>Climate Urgency:</strong> Emissions must be cut to 13 GtCO₂e/y by 2040. Tech alone (CCS, Renewables, Offsets) won't save us; we must reduce energy consumption.</li>
  <li><strong>ICT Impact:</strong> Computing emissions could reach 14% of the global total by 2040 (up from ~3% in 2020).</li>
</ul>`},

  {u:'Sus', q:'Lifecycle Emissions & Drivers', a:`<b>Manufacturing vs. Use Phase</b><br>
<ul>
  <li><strong>Embodied Carbon:</strong> Emissions from manufacturing computing devices (mining, smelting, fabs) significantly exceed emissions from their operational use.</li>
  <li><strong>Worst Offenders:</strong> SSDs, large RAM, and Displays contribute massively to embodied carbon.</li>
  <li><strong>Emission Drivers:</strong> Rapid obsolescence/short replacement cycles (especially mobile), High-Def Video/VR, IoT networks, and the extreme energy costs of AI/LLMs.</li>
</ul>`},

  {u:'Sus', q:'Greenhouse Gas Protocol', a:`<b>Emission Scopes</b><br>
<ul>
  <li><strong>Scope 1 (Direct):</strong> Emissions from owned/controlled sources (e.g. company vehicles, owned generators).</li>
  <li><strong>Scope 2 (Indirect):</strong> Emissions from the generation of purchased electricity, steam, heating, or cooling.</li>
  <li><strong>Scope 3 (Value Chain):</strong> All other indirect upstream/downstream emissions (e.g. manufacturing of purchased goods, end-of-life disposal, employee commuting).</li>
  <li><strong>Scope 4 (Avoided):</strong> Emission reductions that occur outside a product's lifecycle but as a result of using the product (e.g. teleconferencing software saving flights).</li>
</ul>`},

  {u:'Sus', q:'Server Footprint & Software', a:`<b>Calculating &amp; Reducing Impact</b><br>
<ul>
  <li><strong>Total CO₂:</strong> Embodied CO₂ (manufacturing) + CO₂ from use.</li>
  <li><strong>Server Use CO₂:</strong> Lifetime × Electricity Consumption × Carbon Intensity × Power Usage Effectiveness (PUE).</li>
  <li><strong>Software Dev Impact:</strong> Must account for CPU/RAM/Networking overhead during local builds, CI/CD pipelines, and deployed cloud runtimes.</li>
  <li><strong>Goal:</strong> Radically extend device lifetimes to amortize embodied carbon and write more efficient software.</li>
</ul>`},
];

let activeUnit='all', deck=[...ALL_CARDS], idx=0, flipped=false, touchStartX=0;

function unitLabel(id){return(UNITS.find(u=>u.id===id)||{}).label||id;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateCounter(){
  const el=document.getElementById('topCounter');
  if(el&&deck.length)el.innerHTML='<span>'+(idx+1)+'</span> / '+deck.length;
}

function renderCard(dir){
  const card=deck[idx];
  document.getElementById('main').innerHTML=
    '<div class="progress-bar"><div class="progress-fill" style="width:'+((idx+1)/deck.length*100)+'%"></div></div>'+
    '<div class="card-scene" id="cardScene">'+
    '<div class="card'+(flipped?' flipped':'')+'" id="theCard">'+
    '<div class="card-face card-front">'+
    '<div class="card-header"><div class="card-type">Topic</div><div class="card-unit">'+esc(unitLabel(card.u))+'</div></div>'+
    '<div class="card-body"><div class="card-text">'+esc(card.q)+'</div></div>'+
    '<div class="card-mark">?</div>'+
    '<div class="card-hint">tap card · press flip · swipe</div>'+
    '</div>'+
    '<div class="card-face card-back">'+
    '<div class="card-header"><div class="card-type">Detail</div><div class="card-unit">'+esc(unitLabel(card.u))+'</div></div>'+
    '<div class="card-body"><div class="card-text">'+card.a+'</div></div>'+
    '<div class="card-mark">•</div>'+
    '</div></div></div>'+
    '<div class="nav">'+
    '<button class="nav-btn" id="prevBtn">&#8592;</button>'+
    '<button class="flip-btn" id="flipBtn">'+(flipped?'unflip':'flip')+'</button>'+
    '<button class="nav-btn" id="nextBtn">&#8594;</button>'+
    '</div>'+
    '<div class="swipe-hint">&#8592; &#8594; arrow keys &nbsp;·&nbsp; space to flip</div>';

  updateCounter();

  if(dir){
    const s=document.getElementById('cardScene');
    s.classList.add(dir===1?'slide-right':'slide-left');
    setTimeout(function(){s.classList.remove('slide-right','slide-left');},300);
  }

  document.getElementById('theCard').addEventListener('click',toggleFlip);
  document.getElementById('flipBtn').addEventListener('click',toggleFlip);
  document.getElementById('prevBtn').addEventListener('click',function(){navigate(-1);});
  document.getElementById('nextBtn').addEventListener('click',function(){navigate(1);});

  const sc=document.getElementById('cardScene');
  sc.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
  sc.addEventListener('touchend',function(e){
    const dx=touchStartX-e.changedTouches[0].clientX;
    if(Math.abs(dx)>50)navigate(dx>0?1:-1);
  });
}

function toggleFlip(){
  flipped=!flipped;
  const c=document.getElementById('theCard');
  if(c)c.classList.toggle('flipped',flipped);
  const b=document.getElementById('flipBtn');
  if(b)b.textContent=flipped?'unflip':'flip';
}

function navigate(dir){idx=((idx+dir)+deck.length)%deck.length;flipped=false;renderCard(dir);}

function renderUnitStrip(){
  const strip=document.getElementById('unitStrip');
  strip.innerHTML=UNITS.map(function(u){
    return '<button class="unit-tab'+(u.id===activeUnit?' active':'')+'" data-id="'+u.id+'">'+u.label+'</button>';
  }).join('');
  strip.querySelectorAll('.unit-tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      activeUnit=btn.dataset.id;
      deck=activeUnit==='all'?ALL_CARDS.slice():ALL_CARDS.filter(function(c){return c.u===activeUnit;});
      idx=0;flipped=false;
      strip.querySelectorAll('.unit-tab').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      renderCard(null);
    });
  });
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')navigate(1);
  else if(e.key==='ArrowLeft')navigate(-1);
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleFlip();}
});

renderUnitStrip();
renderCard(null);
</script>
</body>
</html>
